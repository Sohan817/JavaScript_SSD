<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="css-code/advanced_function_rps.css" />
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="playGame('rock')" class="move-button">
      <img src="images/rock-emoji.png" class="move-icon" />
    </button>
    <button onclick="playGame('paper')" class="move-button">
      <img src="images/paper-emoji.png" class="move-icon" />
    </button>
    <button onclick="playGame('scissors')" class="move-button">
      <img src="images/scissors-emoji.png" class="move-icon" />
    </button>

    <p class="js-score-result result"></p>
    <p class="js-move"></p>
    <p class="js-score score"></p>
    <button
      onclick="
        score.win = 0;
        score.lost = 0;
        score.tie = 0;
        localStorage.removeItem('score');
        updateScore();
      "
      class="reset-score-button"
    >
      Reset score
    </button>
    <button class="auto-play-button" onclick="autoPlay()">Auto Play</button>
  </body>
  <script src="js-code/advanced_function_rps.js"></script>
</html>
