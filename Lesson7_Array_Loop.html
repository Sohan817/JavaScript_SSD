    //Excercise 10
    arr7 = ["hello", "world", "search", "search", "world", "good", "hello"];
    function findIndex(arr, searchKey) {
      for (let i = 0; i < arr.length; i++) {
        if (searchKey === arr[i]) {
          return i;
        }
      }
      return -1;
    }

    console.log(findIndex(arr7, "search"));

    function unique(arr) {
      let res = [];
      for (let j = 0; j < arr.length; j++) {
        const word = arr[j];
        if (findIndex(res, word) === -1) {
          res.push(arr[j]);
        }
      }
      return res;
    }
    console.log(unique(arr7));
