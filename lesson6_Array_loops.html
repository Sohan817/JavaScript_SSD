<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <input placeholder="What to do" class="js-todo-list" />
    <button onclick="myTodo()">Add</button>
    <div class="js-todo-result"></div>
  </body>
  <script>
    const todoList = [];
    renderTodo();
    function renderTodo() {
      let todoListHtml = [];
      for (let i = 0; i < todoList.length; i++) {
        const todo = todoList[i];
        const html = `<p>${todo}</p>`;
        todoListHtml = todoListHtml + html;
      }
      document.querySelector(".js-todo-result").innerHTML = todoListHtml;
    }

    function myTodo() {
      let todoHtml = document.querySelector(".js-todo-list");
      let name = todoHtml.value;
      todoList.push(name);
      todoHtml.value = "";
      renderTodo();
    }
  </script>
</html>
