    //Exapmle 10
    let arr11 = ["Apple", "Apple", "Mango", "Mango", "Graps", "Orange"];

    function countWards(arr) {
      let res = {};
      for (let i = 0; i < arr.length; i++) {
        const word = arr[i];
        if (!res[word]) {
          res[word] = 1;
        } else {
          res[word]++;
        }
      }
      return res;
    }
    console.log(countWards(arr11));
